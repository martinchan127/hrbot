<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preface HR Assistant</title>
    <!-- n8n Chat CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        :root {
            /* n8n Chat Customization via CSS Variables 
               Adjust these to match Preface's brand guidelines
            */
            --n8n-chat-primary-color: #ff3b30; /* Example Preface Red */
            --n8n-chat-background-color: #ffffff;
            --n8n-chat-font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f9;
        }

        /* Container for the fullscreen chat */
        #n8n-chat-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="n8n-chat-container"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            // Target the container defined above
            target: '#n8n-chat-container',
            
            // Webhook Configuration (Insert your n8n Production Webhook URL here)
            webhookUrl: 'https://martinchan26.app.n8n.cloud/webhook/e85239d9-2cf6-4fc1-bb28-5f0ad320aff7/chat',
            
            // Mode: 'fullscreen' occupies the whole container, 'window' creates a bubble
            mode: 'fullscreen',
            
            // Chat logic settings
            chatInputKey: 'chatInput',
            chatSessionKey: 'sessionId',
            loadPreviousSession: true,
            enableStreaming: true, // Recommended for better AI UX (requires streaming enabled in n8n)

            // Metadata for identifying the context in n8n
            metadata: {
                department: 'HR',
                platform: 'Preface Employee Portal'
            },

            // Visual and Copy Customization
            showWelcomeScreen: true,
            defaultLanguage: 'en',
            
            initialMessages: [
                'Hi there! 👋 Welcome to the Preface HR Assistant.',
                'How can I help you with your HR inquiries today?'
            ],

            i18n: {
                en: {
                    title: 'Preface HR Assistant',
                    subtitle: 'Ask me about leave policy, benefits, or company guidelines.',
                    footer: 'Powered by Preface AI',
                    getStarted: 'Start Inquiring',
                    inputPlaceholder: 'Type your question here...',
                },
                // You can add more languages here (e.g., 'zh-HK') if your n8n workflow handles them
            },

            // File Upload settings (if enabled in your n8n Chat Trigger)
            allowFileUploads: false, 
            // allowedFilesMimeTypes: 'image/*,application/pdf',

            // Optional: Webhook request configuration
            webhookConfig: {
                method: 'POST',
                headers: {}
            }
        });
    </script>
</body>
</html>
