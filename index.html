<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Preface HR Assistant</title>
    <!-- n8n Chat CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        :root {
            /* n8n Chat Customization via CSS Variables */
            --n8n-chat-primary-color: #ff3b30;
            --n8n-chat-background-color: #ffffff;
            --n8n-chat-font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Fix for Safari Mobile: 100dvh accounts for dynamic UI elements */
            height: 100dvh;
            overflow: hidden;
            background-color: #ffffff;
            /* Prevents rubber-banding/bouncing on iOS */
            position: fixed;
        }

        /* Container for the fullscreen chat */
        #n8n-chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Specific fix for the n8n-chat input area on mobile.
           We add a small padding at the bottom to ensure the input 
           isn't clipped by the Safari home indicator or address bar.
        */
        @media (max-width: 768px) {
            .n8n-chat-input-area {
                padding-bottom: env(safe-area-inset-bottom, 20px) !important;
            }
        }
    </style>
</head>
<body>

    <div id="n8n-chat-container"></div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            target: '#n8n-chat-container',
            webhookUrl: 'https://martinchan26.app.n8n.cloud/webhook/e85239d9-2cf6-4fc1-bb28-5f0ad320aff7/chat',
            mode: 'fullscreen',
            chatInputKey: 'chatInput',
            chatSessionKey: 'sessionId',
            loadPreviousSession: true,
            enableStreaming: true,

            metadata: {
                department: 'HR',
                platform: 'Preface Employee Portal'
            },

            showWelcomeScreen: true,
            defaultLanguage: 'en',
            
            initialMessages: [
                'Hi there! 👋 Welcome to the Preface HR Assistant.',
                'How can I help you with your HR inquiries today?'
            ],

            i18n: {
                en: {
                    title: 'Preface HR Assistant',
                    subtitle: 'Ask me about leave policy, benefits, or company guidelines.',
                    footer: 'Powered by Preface AI',
                    getStarted: 'Start Inquiring',
                    inputPlaceholder: 'Type your question here...',
                }
            },

            allowFileUploads: false, 
            webhookConfig: {
                method: 'POST',
                headers: {}
            }
        });
    </script>
</body>
</html>
